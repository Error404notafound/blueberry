<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blueberry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Tela de Login Inicial -->
    <div id="auth-container" class="auth-box">
        <h2>Entrar no Blueberry</h2>
        <input type="email" id="auth-email" placeholder="Seu e-mail">
        <input type="password" id="auth-password" placeholder="Sua senha">
        <button id="btn-login" type="button">Entrar</button>
        <button id="btn-register" type="button" class="btn-secondary">Criar Nova Conta</button>
    </div>

    <!-- Conteúdo Principal (Escondido) -->
    <div id="app-container" style="display: none;">
        <header class="header">
            <div class="logo">Blueberry</div>
            <button id="btn-logout" style="width: auto; margin: 0; padding: 5px 10px;">Sair</button>
        </header>

        <main class="main-container">
            <section class="share-box">
                <textarea id="post-text" placeholder="No que você está pensando?"></textarea>
                <div class="file-inputs">
                    <input type="text" id="video-link-input" placeholder="🌐 Cole o link de um vídeo aqui (opcional)">
                </div>
                <button id="btn-publish" type="button">Publicar</button>
            </section>

            <section id="feed" class="feed"></section>
        </main>
    </div>

    <script type="module" src="script.js"></script>

</body>
</html>
